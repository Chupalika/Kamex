<form [formGroup]="editStaffMemberForm" (ngSubmit)="updateStaffMember()" class="tourney-form" autocomplete="off">
  <mat-form-field>
    <mat-label>Player ID</mat-label>
    <input matInput type="number" formControlName="playerId">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Roles</mat-label>
    <mat-select formControlName="roles" multiple>
      <mat-option *ngFor="let role of staffRoles" [value]="role._id">{{ role.name }}</mat-option>
    </mat-select>
  </mat-form-field>
  <button
      mat-raised-button
      type="submit"
      color="primary"
      [disabled]="disabled || !editStaffMemberForm.valid || requestInProgress || !hasChanges()">
    {{ staffMember ? "Update" : "Add" }}
  </button>
  <button
    mat-raised-button
    class="add-button"
    type="button"
    color="primary"
    (click)="removeStaffMember()"
    [disabled]="disabled || !staffMember || requestInProgress"
  >
    Remove
  </button>
</form>
