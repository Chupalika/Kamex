<div *ngIf="loadingTournament" class="mat-headline-5">Loading...</div>
<div *ngIf="!loadingTournament && !tournament" class="mat-headline-5">Tournament "{{ acronym }}" doesn't exist or failed to load!</div>

<div *ngIf="!loadingTournament && tournament" [class]="{'custom-theme': tournament.theme?.primaryColor || tournament.theme?.accentColor || tournament.theme?.fontName}">
  <div class="mat-headline-5">{{ tournament.name }} Mappools</div>
  
  <div class="mappool-page-container" [ngClass]="{'mobile-mode': mobileMode}">
    <div class="left-side">
      <item-selector
          [labels]="getRoundlabels()"
          [selectedIndex]="selectedRoundIndex"
          (selectedIndexChange)="switchSelectedRoundIndex($event)"
          [isVertical]="!mobileMode"
      ></item-selector>
      <a
        *ngIf="mappool.downloadUrl"
        mat-raised-button
        color="primary"
        [href]="mappool.downloadUrl"
        target="_blank"
      >
        Mappack
      </a>
    </div>

    <div class="mappool-container" [ngClass]="{'mobile-mode': mobileMode}">
      <div *ngIf="loadingRound" class="mat-headline-6">Loading...</div>
      <ng-container *ngIf="tournamentRounds.has(selectedRoundId)">
        <div *ngIf="mappool.slots.length === 0" class="mat-headline-6">
          <ng-container *ngIf="tourneyRound!.mappoolWip">Mappool is not currently public!</ng-container>
          <ng-container *ngIf="!tourneyRound!.mappoolWip">No slots in this round yet!</ng-container>
        </div>
        <div *ngFor="let slot of getSortedSlots()" class="tournament-slot-card" [ngClass]="{'mobile-mode': mobileMode}">
          <tournament-slot-card
            [slot]="slot"
            [category]="getCategory(slot)"
          ></tournament-slot-card>
        </div>
      </ng-container>
    </div>
  </div>
</div>
