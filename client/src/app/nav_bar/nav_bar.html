<div [class]="{'custom-theme': tourney?.theme?.primaryColor || tourney?.theme?.accentColor}">
  <mat-toolbar class="nav-bar mat-elevation-z4">
    <div class="left-side">
      <a mat-button color="primary" routerLink="">Front Page</a>
      <ng-container *ngIf="!tourneyPath">
        <a mat-button color="primary" [routerLink]="getLink('tournament')">Tournaments</a>
        <a mat-button color="primary" [routerLink]="getLink('about')">About</a>
      </ng-container>
    </div>

    <div *ngIf="!mobileMode" class="right-side">
      <ng-container *ngIf="tourneyPath">
        <a mat-button color="primary" [routerLink]="getLink('')">Home</a>
        <a mat-button color="primary" [routerLink]="getLink('registration')">Registration</a>
        <a mat-button color="primary" [routerLink]="getLink('participants')">Participants</a>
        <a mat-button color="primary" [routerLink]="getLink('mappools')">Mappools</a>
        <a mat-button color="primary" [routerLink]="getLink('matches')">Matches</a>
        <a mat-button color="primary" [routerLink]="getLink('stats')">Stats</a>
        <a mat-button color="primary" [routerLink]="getLink('settings')" *ngIf="isStaffMember">Settings</a>
        <div class="separator"></div>
      </ng-container>
      <ng-container *ngIf="appUser">
        <button mat-button [matMenuTriggerFor]="userMenu">
          <div class="user-div">
            <div class="app-user-name">{{ appUser.osuUsername }}</div>
            <img class="app-user-avatar" [src]="appUser.osuAvatarUrl">
          </div>
        </button>
      </ng-container>
      <ng-container *ngIf="!appUser">
        <button mat-button color="primary" (click)="login()">Login</button>
      </ng-container>
    </div>

    <div *ngIf="mobileMode && tourneyPath" class="right-side">
      <button mat-icon-button color="primary" [matMenuTriggerFor]="menu">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item [routerLink]="getLink('')">Home</button>
        <button mat-menu-item [routerLink]="getLink('registration')">Registration</button>
        <button mat-menu-item [routerLink]="getLink('participants')">Participants</button>
        <button mat-menu-item [routerLink]="getLink('mappools')">Mappools</button>
        <button mat-menu-item [routerLink]="getLink('matches')">Matches</button>
        <button mat-menu-item [routerLink]="getLink('stats')">Stats</button>
        <button mat-menu-item [routerLink]="getLink('settings')">Settings</button>
        <ng-container *ngIf="appUser">
          <button mat-menu-item [matMenuTriggerFor]="userMenu" class="username-menu-button">
            <div class="user-div">
              <div class="app-user-name-small">{{ appUser.osuUsername }}</div>
              <img class="app-user-avatar-small" [src]="appUser.osuAvatarUrl">
            </div>
          </button>
        </ng-container>
        <ng-container *ngIf="!appUser">
          <button mat-menu-item (click)="login()">Login</button>
        </ng-container>
      </mat-menu>
    </div>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="openUserSettings()">User Settings</button>
      <button mat-menu-item (click)="logout()">Logout</button>
    </mat-menu>
  </mat-toolbar>
</div>
