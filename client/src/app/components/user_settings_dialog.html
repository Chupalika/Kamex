<div class="user-settings-dialog mat-app-background">
  <div class="mat-headline-5">User Settings for {{ appUser?.osuUsername }}</div>

  <div class="mat-headline-6">Discord</div>
  <div class="discord-info">
    <div class="mat-body-3">{{ appUser?.discordUsername === "" ? "unlinked" : appUser?.discordUsername }}</div>
    <button mat-raised-button color="primary" [disabled]="requestInProgress" (click)="linkDiscord()">
      {{ appUser?.discordId ? "Update" : "Link" }}
    </button>
    <button *ngIf="appUser?.discordId" mat-raised-button color="warn" [disabled]="requestInProgress" (click)="unlinkDiscord()">
      Unlink
    </button>
  </div>

  <form [formGroup]="editUserSettingsForm" (ngSubmit)="updateUserSettings()" class="user-settings-form" autocomplete="off">
  <mat-form-field>
    <mat-label>Timezone</mat-label>
    <input matInput type="number" formControlName="timezone" min="-12" max="14">
  </mat-form-field>
  <button
    mat-raised-button
    type="submit"
    color="primary"
    [disabled]="!editUserSettingsForm.valid || requestInProgress || !hasChanges()">
    Update
  </button>
  </form>
</div>
